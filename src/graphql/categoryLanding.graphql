query CategoryLanding($urlKey: String!) {
  categories(filters: { url_key: { eq: $urlKey } }) {
    items {
      id
      name
      url_key
      meta_title
      meta_description
      children {
        uid
        name
        url_key
        url_path
        product_count
      }
      products(pageSize: 10) {
        items {
          uid
          name
          url_key
          image {
            url
            label
          }
          price_range {
            minimum_price {
              regular_price {
                value
                currency
              }
            }
          }
        }
      }
    }
  }
}
