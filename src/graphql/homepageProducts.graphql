query HomepageProducts {
  products(filter: { category_id: { eq: "102" } }, pageSize: 10) {
    items {
      uid
      name
      url_key
      image {
        url
        label
      }
      price_range {
        minimum_price {
          regular_price {
            value
            currency
          }
        }
      }
    }
  }
}
